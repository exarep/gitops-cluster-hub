apiVersion: v1
kind: ServiceAccount
metadata:
  name: console-plugin-enabler
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "3"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: console-plugin-enabler
  annotations:
    argocd.argoproj.io/sync-wave: "3"
rules:
  - apiGroups:
      - operator.openshift.io
    resources:
      - consoles
    verbs:
      - get
      - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: console-plugin-enabler
  annotations:
    argocd.argoproj.io/sync-wave: "3"
subjects:
  - kind: ServiceAccount
    name: console-plugin-enabler
    namespace: openshift-pipelines
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: console-plugin-enabler
---
apiVersion: batch/v1
kind: Job
metadata:
  name: enable-pipelines-console-plugin
  namespace: openshift-pipelines
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  template:
    spec:
      containers:
        - name: enable-console-plugin
          image: registry.redhat.io/openshift4/ose-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              if oc get console.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' | grep -q pipelines-console-plugin; then
                echo "Console plugin already enabled"
                exit 0
              fi
              oc patch console.operator.openshift.io cluster --type=json \
                -p='[{"op":"add","path":"/spec/plugins/-","value":"pipelines-console-plugin"}]'
      restartPolicy: Never
      serviceAccountName: console-plugin-enabler
  backoffLimit: 3
