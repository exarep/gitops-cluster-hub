apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: gitops-cluster-hub-repo
  namespace: exarep-gitops-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "5"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: gitops-cluster-hub-repo
    template:
      metadata:
        labels:
          argocd.argoproj.io/secret-type: repository
      data:
        type: git
        url: https://github.com/exarep/gitops-cluster-hub.git
        username: git
        password: "{{ .pat }}"
  data:
    - secretKey: pat
      remoteRef:
        key: exarep/github
        property: pat