apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: cluster
  namespace: exarep-gitops-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  description: Cluster configuration and platform operators
  sourceRepos:
    - https://github.com/exarep/gitops-cluster-hub.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: '*'
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'