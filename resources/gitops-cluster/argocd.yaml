apiVersion: argoproj.io/v1beta1
kind: ArgoCD
metadata:
  name: gitops-cluster
  namespace: gitops-cluster
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  server:
    autoscale:
      enabled: false
    grpc:
      ingress:
        enabled: false
    ingress:
      enabled: false
    route:
      enabled: true
      tls:
        termination: reencrypt
  ha:
    enabled: false
  sso:
    provider: dex
    dex:
      openShiftOAuth: true
  rbac:
    defaultPolicy: ""
    policy: |
      g, system:cluster-admins, role:admin
    scopes: '[groups]'
  repo: {}
  resourceHealthChecks:
    - group: external-secrets.io
      kind: ClusterSecretStore
      check: |
        hs = {}
        if obj.status ~= nil then
          if obj.status.conditions ~= nil then
            for i, condition in ipairs(obj.status.conditions) do
              if condition.type == "Ready" then
                if condition.status == "True" then
                  hs.status = "Healthy"
                  hs.message = condition.message or "Store is ready"
                else
                  hs.status = "Degraded"
                  hs.message = condition.message or "Store is not ready"
                end
                return hs
              end
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for store to be ready"
        return hs
  resourceExclusions: |
    - apiGroups:
        - tekton.dev
      clusters:
        - '*'
      kinds:
        - TaskRun
        - PipelineRun
  controller:
    resources:
      limits:
        memory: 2Gi
      requests:
        cpu: 250m
        memory: 1Gi
  applicationSet:
    resources:
      limits:
        memory: 1Gi
      requests:
        cpu: 250m
        memory: 512Mi
