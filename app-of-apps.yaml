apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cluster-app-of-apps
  namespace: exarep-gitops-cluster
spec:
  project: cluster
  source:
    repoURL: https://github.com/exarep/gitops-cluster-hub.git
    targetRevision: main
    path: applications
  destination:
    server: https://kubernetes.default.svc
    namespace: exarep-gitops-cluster
  syncPolicy:
    automated:
      prune: true
      selfHeal: true