---
- name: Bootstrap External Secrets Operator
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    eso_namespace: openshift-external-secrets-operator
    eso_manifests_dir: "{{ playbook_dir }}/openshift-external-secrets-operator"

  tasks:
    - name: Verify logged in to OpenShift
      ansible.builtin.command:
        cmd: oc whoami
      register: oc_whoami
      changed_when: false

    - name: Display cluster user
      ansible.builtin.debug:
        msg: "Logged in as {{ oc_whoami.stdout }}"

    - name: Apply ESO namespace
      ansible.builtin.command:
        cmd: oc apply -f {{ eso_manifests_dir }}/namespace.yaml
      register: apply_ns
      changed_when: "'created' in apply_ns.stdout or 'configured' in apply_ns.stdout"

    - name: Apply ESO operator group
      ansible.builtin.command:
        cmd: oc apply -f {{ eso_manifests_dir }}/operator-group.yaml
      register: apply_og
      changed_when: "'created' in apply_og.stdout or 'configured' in apply_og.stdout"

    - name: Apply ESO subscription
      ansible.builtin.command:
        cmd: oc apply -f {{ eso_manifests_dir }}/subscription.yaml
      register: apply_sub
      changed_when: "'created' in apply_sub.stdout or 'configured' in apply_sub.stdout"

    - name: Wait for ESO subscription to have a CSV
      ansible.builtin.command:
        cmd: >
          oc get subscription openshift-external-secrets-operator-subscription
          -n {{ eso_namespace }}
          -o jsonpath='{.status.installedCSV}'
      register: installed_csv
      until: installed_csv.stdout | length > 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for ESO CSV to succeed
      ansible.builtin.command:
        cmd: >
          oc get csv {{ installed_csv.stdout }}
          -n {{ eso_namespace }}
          -o jsonpath='{.status.phase}'
      register: csv_phase
      until: csv_phase.stdout == 'Succeeded'
      retries: 30
      delay: 10
      changed_when: false

    - name: Apply ExternalSecretsConfig to deploy ESO controllers
      ansible.builtin.command:
        cmd: oc apply -f {{ eso_manifests_dir }}/external-secrets-config.yaml
      register: apply_esc
      changed_when: "'created' in apply_esc.stdout or 'configured' in apply_esc.stdout"

    - name: Wait for ESO controller to be ready
      ansible.builtin.command:
        cmd: >
          oc rollout status deployment/external-secrets
          -n external-secrets --timeout=10s
      register: eso_controller_ready
      until: eso_controller_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Wait for ESO webhook to be ready
      ansible.builtin.command:
        cmd: >
          oc rollout status deployment/external-secrets-webhook
          -n external-secrets --timeout=10s
      register: eso_webhook_ready
      until: eso_webhook_ready.rc == 0
      retries: 30
      delay: 10
      changed_when: false

    - name: Allow HTTPS egress for ESO controller
      ansible.builtin.command:
        cmd: >
          oc apply -f -
        stdin: |
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: allow-aws-egress-for-main-controller
            namespace: external-secrets
          spec:
            podSelector:
              matchLabels:
                app.kubernetes.io/name: external-secrets
            policyTypes:
              - Egress
            egress:
              - ports:
                  - port: 443
                    protocol: TCP
      register: apply_netpol
      changed_when: "'created' in apply_netpol.stdout or 'configured' in apply_netpol.stdout"

    - name: Get current AWS credentials
      ansible.builtin.command:
        cmd: aws configure get {{ item }}
      register: aws_creds
      changed_when: false
      loop:
        - aws_access_key_id
        - aws_secret_access_key

    - name: Set AWS credential facts
      ansible.builtin.set_fact:
        aws_access_key_id: "{{ aws_creds.results[0].stdout | trim }}"
        aws_secret_access_key: "{{ aws_creds.results[1].stdout | trim }}"

    - name: Delete existing AWS credentials secret if present
      ansible.builtin.command:
        cmd: >
          oc delete secret aws-secrets-manager-credentials
          -n {{ eso_namespace }}
          --ignore-not-found
      changed_when: true

    - name: Create AWS credentials secret
      ansible.builtin.command:
        cmd: >
          oc create secret generic aws-secrets-manager-credentials
          --from-literal=access-key={{ aws_access_key_id }}
          --from-literal=secret-access-key={{ aws_secret_access_key }}
          -n {{ eso_namespace }}
      changed_when: true

    - name: Apply ClusterSecretStore
      ansible.builtin.command:
        cmd: oc apply -f {{ eso_manifests_dir }}/cluster-secret-store.yaml
      register: apply_css
      changed_when: "'created' in apply_css.stdout or 'configured' in apply_css.stdout"

    - name: Apply test ExternalSecret
      ansible.builtin.command:
        cmd: >
          oc apply -f -
        stdin: |
          apiVersion: external-secrets.io/v1
          kind: ExternalSecret
          metadata:
            name: test-external-secret
            namespace: {{ eso_namespace }}
          spec:
            refreshInterval: 1m
            secretStoreRef:
              name: aws-secrets-manager
              kind: ClusterSecretStore
            target:
              name: test-secret
            data:
              - secretKey: test
                remoteRef:
                  key: exarep/test
                  property: test
      register: apply_test_es
      changed_when: "'created' in apply_test_es.stdout or 'configured' in apply_test_es.stdout"

    - name: Wait for test secret to be created
      ansible.builtin.command:
        cmd: >
          oc get secret test-secret
          -n {{ eso_namespace }}
          -o jsonpath='{.data.test}'
      register: test_secret
      until: test_secret.stdout | length > 0
      retries: 24
      delay: 5
      changed_when: false

    - name: Validate test secret value
      ansible.builtin.assert:
        that:
          - "test_secret.stdout | b64decode == 'test'"
        fail_msg: "Test secret value does not match expected value"
        success_msg: "ClusterSecretStore is working - test secret validated"

    - name: Clean up test ExternalSecret and Secret
      ansible.builtin.command:
        cmd: >
          oc delete externalsecret test-external-secret
          -n {{ eso_namespace }}
      changed_when: true

    - name: Clean up test secret
      ansible.builtin.command:
        cmd: >
          oc delete secret test-secret
          -n {{ eso_namespace }}
          --ignore-not-found
      changed_when: true

    - name: Display completion message
      ansible.builtin.debug:
        msg:
          - "External Secrets Operator installed and ready"
          - "Secret 'aws-secrets-manager-credentials' created in '{{ eso_namespace }}'"
          - "ClusterSecretStore 'aws-secrets-manager' validated with test secret"
